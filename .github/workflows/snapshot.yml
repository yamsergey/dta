name: Publish SNAPSHOT

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SNAPSHOT version (e.g. 0.9.36-SNAPSHOT)'
        required: true
        default: '0.9.36-SNAPSHOT'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ -SNAPSHOT$ ]]; then
            echo "Error: version must end with -SNAPSHOT"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Derive versions
        id: versions
        run: |
          # Maven: 0.9.36-SNAPSHOT (mutable, overwrites on OSSRH)
          echo "maven=${{ inputs.version }}" >> $GITHUB_OUTPUT
          # Plugin + CLI: 0.9.36-SNAPSHOT.{run_number} (unique per CI run,
          # required by JetBrains Marketplace which rejects duplicate versions)
          echo "unique=${{ inputs.version }}.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Publish libraries to OSSRH snapshots
        run: |
          ./gradlew \
            :dta-sidekick:publishAllPublicationsToMavenCentral \
            :tools-android:publishAllPublicationsToMavenCentral \
            :dta-daemon:publishAllPublicationsToMavenCentral \
            -PdtaVersion=${{ steps.versions.outputs.maven }} \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish plugin to JetBrains Marketplace (EAP)
        run: |
          ./gradlew :dta-plugin:publishPlugin \
            -PdtaVersion=${{ steps.versions.outputs.unique }} \
            --no-configuration-cache
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          PUBLISH_CHANNEL: eap

      - name: Build CLI distribution
        run: |
          VERSION=${{ steps.versions.outputs.unique }}
          ./gradlew :dta-cli:installDist -PdtaVersion=${VERSION}
          cd dta-cli/build/install
          tar -czf dta-cli-${VERSION}.tar.gz dta-cli
          mv dta-cli-${VERSION}.tar.gz ../../../

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dta-snapshot-${{ steps.versions.outputs.unique }}
          path: |
            dta-cli-*.tar.gz
            dta-plugin/build/distributions/*.zip

      - name: Summary
        run: |
          echo "## SNAPSHOT Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Libraries (OSSRH — mutable)" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.versions.outputs.maven }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`io.github.yamsergey:dta-sidekick:${{ steps.versions.outputs.maven }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`io.github.yamsergey:tools-android:${{ steps.versions.outputs.maven }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`io.github.yamsergey:dta-daemon:${{ steps.versions.outputs.maven }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Plugin + CLI (unique per build)" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.versions.outputs.unique }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Plugin → JetBrains Marketplace **EAP** channel" >> $GITHUB_STEP_SUMMARY
          echo "- CLI → download from artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resolve SNAPSHOTs in consumer projects" >> $GITHUB_STEP_SUMMARY
          echo '```kotlin' >> $GITHUB_STEP_SUMMARY
          echo 'repositories {' >> $GITHUB_STEP_SUMMARY
          echo '    maven("https://central.sonatype.com/repository/maven-snapshots/")' >> $GITHUB_STEP_SUMMARY
          echo '}' >> $GITHUB_STEP_SUMMARY
          echo 'dependencies {' >> $GITHUB_STEP_SUMMARY
          echo '    debugImplementation("io.github.yamsergey:dta-sidekick:${{ steps.versions.outputs.maven }}")' >> $GITHUB_STEP_SUMMARY
          echo '}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
