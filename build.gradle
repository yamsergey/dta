buildscript {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.3'
        classpath 'com.vanniktech.maven.publish:com.vanniktech.maven.publish.gradle.plugin:0.30.0'
        // Force 1.25.0+ so Spring Boot's bootJar works (AGP transitively brings 1.21)
        classpath 'org.apache.commons:commons-compress:1.25.0'
    }
}

allprojects {
    version = dtaVersion
}

subprojects {
    // Skip Android library modules - they have their own configuration
    if (project.name == 'dta-sidekick') {
        return
    }

    group = 'io.yamsergey.dta'
    apply plugin: 'java'

    java {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    repositories {
        mavenCentral()
    }

    dependencies {
        testImplementation platform(libs.junit.bom)
        testImplementation libs.junit.jupiter
    }

    test {
        useJUnitPlatform()
    }
}

tasks.register('cleanLsp') {
    group = 'cleanup'
    description = 'Removes .settings and .project files created by jdtls'

    def projectDirs = allprojects.collect { it.projectDir }

    doLast {
        projectDirs.each { dir ->
            def settingsDir = new File(dir, '.settings')
            def projectFile = new File(dir, '.project')

            if (settingsDir.exists()) {
                settingsDir.deleteDir()
                println "Deleted ${settingsDir}"
            }
            if (projectFile.exists()) {
                projectFile.delete()
                println "Deleted ${projectFile}"
            }
        }
    }
}
