# JitPack configuration for DTA libraries
# Artifacts are public, source is private

jdk:
  - openjdk21

# Accept Android SDK licenses and install NDK for native build
before_install:
  - yes | sdkmanager --licenses &> /dev/null || true
  - sdkmanager --install "ndk;26.1.10909125" &> /dev/null || true

# Build and publish both libraries to local Maven
install:
  - ./gradlew :dta-sidekick:publishToMavenLocal :tools-android:publishToMavenLocal -x test --no-daemon

