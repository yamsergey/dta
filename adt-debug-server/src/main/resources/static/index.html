                                           :multi-selected-ids="multiSelectedIds"
                                           @select="onTreeSelect"
                                           @hover="onTreeHover"/>
                            </div>
                            <div v-else style="color: #666; padding: 16px;">Loading tree...</div>
                        </div>

                        <!-- Element Details -->
                        <div v-if="selectedElement" class="element-detail">
                            <div class="detail-title">
                                <span>{{ selectedElement.composable }}</span>
                                <button class="btn-small" @click="exportSelectedElements">Export JSON</button>
                            </div>
                            <div v-if="selectedAncestors.length > 0" class="ancestors">
                                <span v-for="(a, i) in selectedAncestors" :key="i" class="ancestor-chip">{{ a }}</span>
                                <span class="ancestor-chip">{{ selectedElement.composable }}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Bounds</span>
                                <span class="detail-value code">
                                    [{{ selectedElement.bounds.left }}, {{ selectedElement.bounds.top }},
                                    {{ selectedElement.bounds.right }}, {{ selectedElement.bounds.bottom }}]
                                </span>
                            </div>
                            <div v-if="selectedElement.className" class="detail-row">
                                <span class="detail-label">Class</span>
                                <span class="detail-value code">{{ selectedElement.className }}</span>
                            </div>
                            <div v-if="selectedElement.packageName" class="detail-row">
                                <span class="detail-label">Package</span>
                                <span class="detail-value code">{{ selectedElement.packageName }}</span>
                            </div>
                            <div v-if="selectedElement.sourceFile" class="detail-row">
                                <span class="detail-label">Source</span>
                                <span class="detail-value code">{{ selectedElement.sourceFile }}</span>
                            </div>
                            <div v-if="selectedElement.text" class="detail-row">
                                <span class="detail-label">Text</span>
                                <span class="detail-value">"{{ selectedElement.text }}"</span>
                            </div>
                            <div v-if="selectedElement.role" class="detail-row">
                                <span class="detail-label">Role</span>
                                <span class="detail-value">{{ selectedElement.role }}</span>
                            </div>
                            <div v-if="selectedElement.testTag" class="detail-row">
                                <span class="detail-label">Test Tag</span>
                                <span class="detail-value code">{{ selectedElement.testTag }}</span>
                            </div>
                            <div v-if="selectedElement.contentDescription" class="detail-row">
                                <span class="detail-label">Content Desc</span>
                                <span class="detail-value">{{ selectedElement.contentDescription }}</span>
                            </div>
                            <div v-if="selectedElement.semanticsId" class="detail-row">
                                <span class="detail-label">Semantics ID</span>
                                <span class="detail-value">{{ selectedElement.semanticsId }}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">ID</span>
                                <span class="detail-value code">{{ selectedElement.id }}</span>
                            </div>
                        </div>
                        <div v-else class="element-detail" style="color: #666; text-align: center;">
                            Click on the screenshot or tree to select an element
                        </div>
                    </div>
                </div>
            </template>

            <!-- WebSocket List View -->
            <template v-else-if="view === 'websocket'">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <h1>WebSocket Connections</h1>
                        <div class="live-indicator">
                            <span class="live-dot" :class="{ paused: !wsIsLive }"></span>
                            <span>{{ wsIsLive ? 'Live' : 'Paused' }}</span>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-secondary" @click="view = 'home'">Home</button>
                        <button class="btn btn-secondary" @click="wsIsLive = !wsIsLive">
                            {{ wsIsLive ? 'Pause' : 'Resume' }}
                        </button>
                        <button class="btn btn-secondary" @click="refreshWebSocketConnections">Refresh</button>
                    </div>
                </div>

                <div class="card" style="padding: 0;">
                    <div class="header-row">
                        <span class="col-ws-status">Status</span>
                        <span class="col-ws-source">Source</span>
                        <span class="col-ws-url">URL</span>
                        <span class="col-ws-time">Connected</span>
                    </div>

                    <div v-if="wsConnections.length === 0" class="empty">
                        No WebSocket connections captured yet
                    </div>
                    <div v-else>
                        <div v-for="conn in wsConnections" :key="conn.id"
                             class="ws-connection-row"
                             @click="showWsDetail(conn.id)">
                            <span class="col-ws-status">
                                <span class="ws-status" :class="conn.status">{{ conn.status }}</span>
                            </span>
                            <span class="col-ws-source">
                                <span class="ws-source">{{ conn.source }}</span>
                            </span>
                            <span class="col-ws-url">{{ conn.url }}</span>
                            <span class="col-ws-time">{{ formatTime(conn.connectedAt) }}</span>
                        </div>
                    </div>
                </div>

                <p class="count-text">{{ wsConnections.length }} connections</p>
            </template>

            <!-- WebSocket Detail View -->
            <template v-else-if="view === 'websocket-detail' && selectedWsConnection">
                <div style="margin-bottom: 16px;">
                    <a href="#" @click.prevent="view = 'websocket'" style="color: #4caf50;">&larr; Back to connections</a>
                </div>

                <div class="card">
                    <div class="ws-detail-header">
                        <span class="ws-status" :class="selectedWsConnection.status">{{ selectedWsConnection.status }}</span>
                        <span class="ws-source">{{ selectedWsConnection.source }}</span>
                    </div>
                    <p class="ws-detail-url">{{ selectedWsConnection.url }}</p>

                    <div class="meta">
                        <div class="meta-item">
                            <div class="meta-label">Connected At</div>
                            <div class="meta-value">{{ formatDateTime(selectedWsConnection.connectedAt) }}</div>
                        </div>
                        <div class="meta-item" v-if="selectedWsConnection.closedAt">
                            <div class="meta-label">Closed At</div>
                            <div class="meta-value">{{ formatDateTime(selectedWsConnection.closedAt) }}</div>
                        </div>
                        <div class="meta-item" v-if="selectedWsConnection.closeCode">
                            <div class="meta-label">Close Code</div>
                            <div class="meta-value">{{ selectedWsConnection.closeCode }}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Messages</div>
                            <div class="meta-value">{{ wsMessages.length }}</div>
                        </div>
                    </div>
                </div>

                <h2 style="margin: 16px 0 8px;">Messages</h2>

                <div class="card" style="padding: 0;">
                    <div class="header-row">
                        <span style="width: 24px;"></span>
                        <span class="ws-msg-time">Time</span>
                        <span class="ws-msg-type">Type</span>
                        <span style="flex: 1;">Payload</span>
                        <span class="ws-msg-size">Size</span>
                    </div>

                    <div v-if="wsMessages.length === 0" class="empty">
                        No messages captured
                    </div>
                    <div v-else>
                        <div v-for="(msg, idx) in wsMessages" :key="idx"
                             class="ws-message" :class="msg.direction.toLowerCase()">
                            <span class="ws-direction" :class="msg.direction.toLowerCase()">
                                {{ msg.direction === 'SENT' ? '↑' : '↓' }}
                            </span>
                            <span class="ws-msg-time">{{ formatTime(msg.timestamp) }}</span>
                            <span class="ws-msg-type">{{ msg.type }}</span>
                            <span class="ws-msg-payload">{{ truncatePayload(msg.textPayload || '[binary]', 200) }}</span>
                            <span class="ws-msg-size">{{ formatSize(msg.payloadSize) }}</span>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Toast notification -->
            <div class="toast" :class="{ show: toastVisible }">{{ toastMessage }}</div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted, watch, h } = Vue;

        // Tree Node Component
        const TreeNode = {
            name: 'TreeNode',
            props: ['node', 'selectedId', 'hoveredId', 'multiSelectedIds', 'depth'],
            emits: ['select', 'hover'],
            setup(props, { emit }) {
                const expanded = ref(true);
                const hasChildren = computed(() => props.node?.children?.length > 0);
                const isSelected = computed(() => props.node?.id === props.selectedId);
                const isHovered = computed(() => props.node?.id === props.hoveredId && !isSelected.value);
                const isMultiSelected = computed(() => props.multiSelectedIds?.includes(props.node?.id));

                function toggle(e) {
                    e.stopPropagation();
                    expanded.value = !expanded.value;
                }

                function onSelect(e) {
                    emit('select', props.node, e.shiftKey);
                }

                function onHover() {
                    emit('hover', props.node);
                }

                function onLeave() {
                    emit('hover', null);
                }

                function truncateText(text, len) {
                    if (!text) return '';
                    return text.length > len ? text.substring(0, len) + '...' : text;
                }

                return () => {
                    if (!props.node) return null;
                    const depth = props.depth || 0;

                    const nodeClasses = ['tree-node'];
                    if (isSelected.value) nodeClasses.push('selected');
                    if (isHovered.value) nodeClasses.push('hovered');
                    if (isMultiSelected.value) nodeClasses.push('multi-selected');

                    const children = [];

                    // Toggle icon
                    children.push(h('span', {
                        class: 'tree-toggle',
                        onClick: toggle
                    }, hasChildren.value ? (expanded.value ? '▼' : '▶') : ' '));

                    // Composable name
                    children.push(h('span', { class: 'tree-name' }, props.node.composable || 'Unknown'));

                    // Text preview
                    if (props.node.text) {
                        children.push(h('span', { class: 'tree-text' }, '"' + truncateText(props.node.text, 15) + '"'));
                    }

                    const elements = [
                        h('div', {
                            class: nodeClasses.join(' '),
                            onClick: onSelect,
                            onMouseenter: onHover,
                            onMouseleave: onLeave
                        }, children)
                    ];

                    // Render children
                    if (hasChildren.value && expanded.value) {
                        const childElements = props.node.children.map(child =>
                            h(TreeNode, {
                                node: child,
                                selectedId: props.selectedId,
                                hoveredId: props.hoveredId,
                                multiSelectedIds: props.multiSelectedIds,
                                depth: depth + 1,
                                onSelect: (n, shift) => emit('select', n, shift),
                                onHover: (n) => emit('hover', n)
                            })
                        );
                        elements.push(h('div', { class: 'tree-children' }, childElements));
                    }

                    return h('div', elements);
                };
            }
        };

        const app = createApp({
            setup() {
                // State
                const view = ref('home');
                const packageName = ref('');
                const eventCount = ref(0);
                const streamingConnected = ref(false);
                const requests = ref([]);
                const requestMap = ref(new Map());
                const selectedRequest = ref(null);
                const isLive = ref(true);
                const sortField = ref('timestamp');
                const sortAsc = ref(false);
                const activeTab = ref('request');
                const latestTimestamp = ref(0);
                const toastMessage = ref('');
                const toastVisible = ref(false);

                // WebSocket Inspector state
                const wsConnections = ref([]);
                const selectedWsConnection = ref(null);
                const wsMessages = ref([]);
                const wsIsLive = ref(true);

                // Layout Inspector state
                const screenshotUrl = ref(null);
                const screenshotLoaded = ref(false);
                const screenshotNaturalWidth = ref(0);
                const screenshotNaturalHeight = ref(0);
                const composeTree = ref(null);
                const selectedElement = ref(null);
                const selectedAncestors = ref([]);
                const hoveredElement = ref(null);
                const hoverTooltipPos = ref(null);
                const multiSelectedElements = ref([]);
                const inspectorError = ref(null);
                // Use proxy endpoints (same origin) to avoid CORS issues
                const apiBaseUrl = ref('/api/compose');
                const screenshotContainer = ref(null);
                const screenshotImg = ref(null);

                const multiSelectedIds = computed(() => multiSelectedElements.value.map(e => e.id));

                // ViewBox should match the screenshot's natural dimensions
                // This ensures bounds coordinates map correctly to the overlay
                const overlayViewBoxWidth = computed(() => {
                    return screenshotNaturalWidth.value || composeTree.value?.screen?.screenWidth || 1080;
                });
                const overlayViewBoxHeight = computed(() => {
                    return screenshotNaturalHeight.value || composeTree.value?.screen?.screenHeight || 2400;
                });

                // Window offset - bounds from localToScreen are absolute screen coords,
                // but screenshot is captured from window which may be offset (e.g., status bar)
                const windowOffsetX = computed(() => {
                    return composeTree.value?.screen?.windowOffsetX || 0;
                });
                const windowOffsetY = computed(() => {
                    return composeTree.value?.screen?.windowOffsetY || 0;
                });

                // Calculate the actual rendered image area within the img element
                // accounting for object-fit: contain which scales and centers the image
                function getRenderedImageRect(img) {
                    const containerW = img.clientWidth;
                    const containerH = img.clientHeight;
                    const imgW = img.naturalWidth;
                    const imgH = img.naturalHeight;

                    // object-fit: contain scales uniformly to fit within container
                    const scale = Math.min(containerW / imgW, containerH / imgH);
                    const renderedW = imgW * scale;
                    const renderedH = imgH * scale;
                    // Content is centered within the element
                    const renderedX = (containerW - renderedW) / 2;
                    const renderedY = (containerH - renderedH) / 2;

                    return { x: renderedX, y: renderedY, width: renderedW, height: renderedH };
                }

                const overlayStyle = computed(() => {
                    if (!screenshotImg.value || !screenshotLoaded.value) return {};
                    const img = screenshotImg.value;

                    // Get the actual rendered image area (accounting for object-fit: contain)
                    const rect = getRenderedImageRect(img);

                    return {
                        width: rect.width + 'px',
                        height: rect.height + 'px',
                        left: (img.offsetLeft + rect.x) + 'px',
                        top: (img.offsetTop + rect.y) + 'px'
                    };
                });

                let pollInterval = null;
                let statusInterval = null;
                let wsPollInterval = null;
                let toastTimeout = null;

                // Computed
                const sortedRequests = computed(() => {
                    const sorted = [...requests.value];
                    sorted.sort((a, b) => {
                        let aVal, bVal;
                        if (sortField.value === 'timestamp') {
                            aVal = a.timestamp;
                            bVal = b.timestamp;
                        } else if (sortField.value === 'url') {
                            aVal = getUrl(a);
                            bVal = getUrl(b);
                        } else if (sortField.value === 'responseCode') {
                            aVal = getStatusCode(a) || 0;
                            bVal = getStatusCode(b) || 0;
                        } else if (sortField.value === 'duration') {
                            aVal = getDuration(a);
                            bVal = getDuration(b);
                        }
                        if (aVal < bVal) return sortAsc.value ? -1 : 1;
                        if (aVal > bVal) return sortAsc.value ? 1 : -1;
                        return 0;
                    });
                    return sorted;
                });

                // Methods
                function formatTime(timestamp) {
                    const date = new Date(timestamp);
                    return date.toLocaleTimeString('en-US', {
                        hour12: false,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        fractionalSecondDigits: 3
                    });
                }

                function getMethod(req) {
                    if (!req) return '?';
                    // Support both sidekick format (direct) and old EventService format (nested in data)
                    return req.method || req.data?.method || req.data?.request?.method || '?';
                }

                function getUrl(req) {
                    if (!req) return 'Unknown';
                    return req.url || req.data?.url || req.data?.request?.url || 'Unknown';
                }

                function getStatusCode(req) {
                    if (!req) return 0;
                    return req.responseCode || req.data?.responseCode || req.data?.response?.statusCode || 0;
                }

                function getDuration(req) {
                    if (!req) return 0;
                    return req.duration || req.data?.duration || 0;
                }

                function getStatusClass(req) {
                    const code = getStatusCode(req);
                    if (code >= 200 && code < 300) return 's2xx';
                    if (code >= 300 && code < 400) return 's3xx';
                    if (code >= 400 && code < 500) return 's4xx';
                    return 's5xx';
                }

                function getHeaders(req, type) {
                    if (!req) return [];

                    // Support sidekick format (direct on req): req.requestHeaders / req.responseHeaders
                    const headerKey = type + 'Headers';
                    let headers = req[headerKey];

                    if (headers && typeof headers === 'object' && !Array.isArray(headers)) {
                        return Object.entries(headers).map(([name, value]) => ({ name, value }));
                    }

                    // Support old EventService format (nested in req.data)
                    const data = req.data;
                    if (data) {
                        headers = data[headerKey];
                        if (headers && typeof headers === 'object' && !Array.isArray(headers)) {
                            return Object.entries(headers).map(([name, value]) => ({ name, value }));
                        }

                        // Try nested structure (SSE streaming format)
                        const nested = data[type];
                        if (nested && nested.headers && Array.isArray(nested.headers)) {
                            return nested.headers.map(h => ({
                                name: Array.isArray(h) ? h[0] : h.name,
                                value: Array.isArray(h) ? h[1] : h.value
                            }));
                        }
                    }

                    return [];
                }

                function getBody(req, type) {
                    if (!req) return null;

                    // Support sidekick format (direct on req): req.requestBody / req.responseBody
                    const bodyKey = type + 'Body';
                    if (req[bodyKey]) return req[bodyKey];

                    // Support old EventService format (nested in req.data)
                    const data = req.data;
                    if (data) {
                        if (data[bodyKey]) return data[bodyKey];

                        // Try nested structure
                        const nested = data[type];
                        if (nested && nested.body) return nested.body;
                    }

                    return null;
                }

                function toggleSort(field) {
                    if (sortField.value === field) {
                        sortAsc.value = !sortAsc.value;
                    } else {
                        sortField.value = field;
                        sortAsc.value = false;
                    }
                }

                async function showDetail(id) {
                    // Fetch full details from sidekick
                    try {
                        const res = await fetch(`/api/network/${id}`, { credentials: 'same-origin' });
                        if (res.ok) {
                            const detail = await res.json();
                            // Merge with existing data and update the map
                            const existing = requestMap.value.get(id) || {};
                            selectedRequest.value = { ...existing, ...detail };
                            requestMap.value.set(id, selectedRequest.value);
                        } else {
                            // Fallback to cached data
                            selectedRequest.value = requestMap.value.get(id);
                        }
                    } catch (e) {
                        console.error('Failed to fetch request details:', e);
                        selectedRequest.value = requestMap.value.get(id);
                    }

                    // Sync selected network request to backend (for MCP to query)
                    syncNetworkSelection(selectedRequest.value);

                    activeTab.value = 'request';
                    view.value = 'detail';
                }

                // Sync network request selection to backend
                async function syncNetworkSelection(request) {
                    try {
                        await fetch('/api/sessions/active/selected-network', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'same-origin',
                            body: JSON.stringify({ request })
                        });
                    } catch (e) {
                        console.debug('Failed to sync network selection:', e);
                    }
                }

                function clearRequests() {
                    requests.value = [];
                    requestMap.value.clear();
                    latestTimestamp.value = Date.now();
                }

                function showToast(message) {
                    toastMessage.value = message;
                    toastVisible.value = true;
                    if (toastTimeout) clearTimeout(toastTimeout);
                    toastTimeout = setTimeout(() => {
                        toastVisible.value = false;
                    }, 2000);
                }

                async function copyBody(type) {
                    const body = getBody(selectedRequest.value, type);
                    if (body) {
                        try {
                            await navigator.clipboard.writeText(body);
                            showToast('Copied to clipboard');
                        } catch (e) {
                            showToast('Failed to copy');
                        }
                    }
                }

                function downloadBody(type) {
                    const body = getBody(selectedRequest.value, type);
                    if (!body) return;

                    const method = getMethod(selectedRequest.value);
                    const url = new URL(getUrl(selectedRequest.value));
                    const filename = `${method.toLowerCase()}_${url.pathname.replace(/\//g, '_')}_${type}_body.txt`;

                    downloadFile(body, filename, 'text/plain');
                    showToast('Download started');
                }

                function exportTransaction(req) {
                    const method = getMethod(req);
                    const url = new URL(getUrl(req));
                    const filename = `${method.toLowerCase()}_${url.pathname.replace(/\//g, '_')}_${req.id}.json`;

                    const json = JSON.stringify(req, null, 2);
                    downloadFile(json, filename, 'application/json');
                    showToast('Export started');
                }

                function exportAllTransactions() {
                    if (requests.value.length === 0) {
                        showToast('No transactions to export');
                        return;
                    }

                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                    const filename = `network_transactions_${timestamp}.json`;

                    const json = JSON.stringify(requests.value, null, 2);
                    downloadFile(json, filename, 'application/json');
                    showToast(`Exported ${requests.value.length} transactions`);
                }

                function downloadFile(content, filename, mimeType) {
                    const blob = new Blob([content], { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }

                async function fetchStatus() {
                    try {
                        const res = await fetch('/api/status', { credentials: 'same-origin' });
                        if (res.ok) {
                            const data = await res.json();
                            packageName.value = data.packageName || '';
                            eventCount.value = data.eventCount || 0;
                            streamingConnected.value = data.streamingConnected || false;
                        }
                    } catch (e) {
                        console.log('Status fetch error:', e);
                    }
                }

                async function fetchRequests() {
                    try {
                        const res = await fetch('/api/network', { credentials: 'same-origin' });
                        if (res.ok) {
                            const data = await res.json();
                            processRequests(data, true);
                        }
                    } catch (e) {
                        console.log('Requests fetch error:', e);
                    }
                }

                async function checkForUpdates() {
                    if (!isLive.value) return;
                    try {
                        const res = await fetch(`/api/network?since=${latestTimestamp.value}`, {
                            credentials: 'same-origin'
                        });
                        if (res.ok) {
                            const data = await res.json();
                            processRequests(data, false);
                        }
                    } catch (e) {
                        console.log('Update fetch error:', e);
                    }
                }

                function processRequests(data, initial) {
                    if (!Array.isArray(data)) return;

                    for (const event of data) {
                        // Use startTime from sidekick format
                        const ts = event.startTime || event.timestamp || 0;
                        if (ts > latestTimestamp.value) {
                            latestTimestamp.value = ts;
                        }

                        const existing = requestMap.value.get(event.id);
                        if (existing) {
                            // Update existing request
                            Object.assign(existing, event);
                        } else {
                            // Add new request
                            const req = { ...event, isNew: !initial };
                            requests.value.push(req);
                            requestMap.value.set(event.id, req);

                            // Remove "new" highlight after animation
                            if (!initial) {
                                setTimeout(() => { req.isNew = false; }, 2000);
                            }
                        }
                    }
                }

                // =====================================================
                // Layout Inspector Methods
                // =====================================================

                async function openLayoutInspector() {
                    view.value = 'inspector';
                    inspectorError.value = null;
                    await refreshScreenshot();
                }

                async function refreshScreenshot() {
                    screenshotLoaded.value = false;
                    try {
                        // Fetch screenshot via proxy
                        const screenshotRes = await fetch(apiBaseUrl.value + '/screenshot', {
                            credentials: 'same-origin'
                        });
                        if (!screenshotRes.ok) {
                            throw new Error('Failed to capture screenshot');
                        }
                        const blob = await screenshotRes.blob();
                        screenshotUrl.value = URL.createObjectURL(blob);

                        // Fetch compose tree via proxy
                        const treeRes = await fetch(apiBaseUrl.value + '/tree', {
                            credentials: 'same-origin'
                        });
                        if (treeRes.ok) {
                            composeTree.value = await treeRes.json();
                        }

                        inspectorError.value = null;
                    } catch (e) {
                        inspectorError.value = 'Failed to connect to agent. Make sure the app with ADT Sidekick is running and ADB port forwarding is enabled (adb forward tcp:8642 tcp:8642). Error: ' + e.message;
                        console.error('Inspector error:', e);
                    }
                }

                function onScreenshotLoad() {
                    const img = screenshotImg.value;
                    if (img) {
                        screenshotNaturalWidth.value = img.naturalWidth;
                        screenshotNaturalHeight.value = img.naturalHeight;
                        screenshotLoaded.value = true;
                    }
                }

                async function onScreenshotClick(e) {
                    if (!screenshotLoaded.value || !screenshotImg.value) return;

                    const coords = getScreenCoordinates(e);
                    if (!coords) return;

                    try {
                        const res = await fetch(
                            `${apiBaseUrl.value}/select?x=${coords.x}&y=${coords.y}`,
                            { credentials: 'same-origin' }
                        );
                        if (res.ok) {
                            const data = await res.json();
                            if (data.found) {
                                if (e.shiftKey) {
                                    // Multi-select
                                    toggleMultiSelect(data.element);
                                } else {
                                    // Single select
                                    selectedElement.value = data.element;
                                    selectedAncestors.value = data.ancestors || [];
                                }
                            }
                        }
                    } catch (err) {
                        console.error('Hit test error:', err);
                    }
                }

                async function onScreenshotHover(e) {
                    if (!screenshotLoaded.value || !screenshotImg.value) return;

                    const coords = getScreenCoordinates(e);
                    if (!coords) {
                        hoveredElement.value = null;
                        hoverTooltipPos.value = null;
                        return;
                    }

                    // Debounce - only fetch if significantly moved
                    const container = screenshotContainer.value;
                    const rect = container.getBoundingClientRect();
                    hoverTooltipPos.value = {
                        x: e.clientX - rect.left + 15,
                        y: e.clientY - rect.top + 15
                    };

                    // Find element from tree (local, no API call for hover)
                    if (composeTree.value?.root) {
                        hoveredElement.value = findElementAtPoint(composeTree.value.root, coords.x, coords.y);
                    }
                }

                function onScreenshotLeave() {
                    hoveredElement.value = null;
                    hoverTooltipPos.value = null;
                }

                function getScreenCoordinates(e) {
                    const img = screenshotImg.value;
                    if (!img) return null;

                    const rect = img.getBoundingClientRect();
                    const scaleX = img.naturalWidth / img.clientWidth;
                    const scaleY = img.naturalHeight / img.clientHeight;

                    const x = Math.round((e.clientX - rect.left) * scaleX);
                    const y = Math.round((e.clientY - rect.top) * scaleY);

                    if (x < 0 || y < 0 || x > img.naturalWidth || y > img.naturalHeight) {
                        return null;
                    }

                    return { x, y };
                }

                function findElementAtPoint(node, x, y) {
                    if (!node?.bounds) return null;

                    const b = node.bounds;
                    if (x < b.left || x > b.right || y < b.top || y > b.bottom) {
                        return null;
                    }

                    // Check children (deepest first)
                    if (node.children) {
                        for (let i = node.children.length - 1; i >= 0; i--) {
                            const found = findElementAtPoint(node.children[i], x, y);
                            if (found) return found;
                        }
                    }

                    return node;
                }

                function onTreeSelect(node, shiftKey) {
                    if (shiftKey) {
                        toggleMultiSelect(node);
                    } else {
                        selectedElement.value = node;
                        selectedAncestors.value = findAncestors(composeTree.value?.root, node.id) || [];
                    }
                }

                function onTreeHover(node) {
                    hoveredElement.value = node;
                }

                function findAncestors(node, targetId, path = []) {
                    if (!node) return null;
                    if (node.id === targetId) return path;

                    if (node.children) {
                        for (const child of node.children) {
                            const result = findAncestors(child, targetId, [...path, node.composable]);
                            if (result) return result;
                        }
                    }
                    return null;
                }

                function isSelected(element) {
                    if (!element) return false;
                    return element.id === selectedElement.value?.id ||
                           multiSelectedIds.value.includes(element.id);
                }

                function toggleMultiSelect(element) {
                    const idx = multiSelectedElements.value.findIndex(e => e.id === element.id);
                    if (idx >= 0) {
                        multiSelectedElements.value.splice(idx, 1);
                    } else {
                        multiSelectedElements.value.push(element);
                    }
                }

                function clearMultiSelect() {
                    multiSelectedElements.value = [];
                }

                function exportSelectedElements() {
                    const elements = [];
                    if (selectedElement.value) {
                        elements.push(selectedElement.value);
                    }
                    elements.push(...multiSelectedElements.value);

                    if (elements.length === 0) {
                        showToast('No elements selected');
                        return;
                    }

                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                    const filename = elements.length === 1
                        ? `element_${elements[0].composable}_${timestamp}.json`
                        : `elements_${elements.length}_${timestamp}.json`;

                    const data = elements.length === 1 ? elements[0] : elements;
                    const json = JSON.stringify(data, null, 2);
                    downloadFile(json, filename, 'application/json');
                    showToast(`Exported ${elements.length} element(s)`);
                }

                function truncate(text, len) {
                    if (!text) return '';
                    return text.length > len ? text.substring(0, len) + '...' : text;
                }

                // =====================================================
                // WebSocket Inspector Methods
                // =====================================================

                async function openWebSocketInspector() {
                    view.value = 'websocket';
                    await refreshWebSocketConnections();
                    // Start polling for WebSocket updates
                    if (!wsPollInterval) {
                        wsPollInterval = setInterval(checkForWsUpdates, 2000);
                    }
                }

                async function refreshWebSocketConnections() {
                    try {
                        const res = await fetch('/api/websocket/connections', {
                            credentials: 'same-origin'
                        });
                        if (res.ok) {
                            const data = await res.json();
                            wsConnections.value = data.connections || [];
                        }
                    } catch (e) {
                        console.error('WebSocket connections fetch error:', e);
                    }
                }

                async function checkForWsUpdates() {
                    if (!wsIsLive.value) return;
                    if (view.value !== 'websocket' && view.value !== 'websocket-detail') return;
                    await refreshWebSocketConnections();

                    // If viewing detail, also refresh messages
                    if (view.value === 'websocket-detail' && selectedWsConnection.value) {
                        await fetchWsMessages(selectedWsConnection.value.id);
                    }
                }

                async function showWsDetail(connectionId) {
                    try {
                        const res = await fetch(`/api/websocket/connections/${connectionId}`, {
                            credentials: 'same-origin'
                        });
                        if (res.ok) {
                            const data = await res.json();
                            selectedWsConnection.value = data;
                            // Messages are included in the connection details
                            wsMessages.value = data.messages || [];
                            view.value = 'websocket-detail';
                        }
                    } catch (e) {
                        console.error('WebSocket connection fetch error:', e);
                    }
                }

                async function fetchWsMessages(connectionId) {
                    // Messages are included in connection details, refetch connection
                    try {
                        const res = await fetch(`/api/websocket/connections/${connectionId}`, {
                            credentials: 'same-origin'
                        });
                        if (res.ok) {
                            const data = await res.json();
                            selectedWsConnection.value = data;
                            wsMessages.value = data.messages || [];
                        }
                    } catch (e) {
                        console.error('WebSocket messages fetch error:', e);
                    }
                }

                function formatDateTime(timestamp) {
                    if (!timestamp) return '-';
                    const date = new Date(timestamp);
                    return date.toLocaleString('en-US', {
                        hour12: false,
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                }

                function formatSize(bytes) {
                    if (!bytes && bytes !== 0) return '-';
                    if (bytes < 1024) return bytes + 'B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
                    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
                }

                function truncatePayload(text, len) {
                    if (!text) return '';
                    return text.length > len ? text.substring(0, len) + '...' : text;
                }

                // Lifecycle
                onMounted(async () => {
                    await fetchStatus();
                    await fetchRequests();

                    // Poll for updates
                    pollInterval = setInterval(checkForUpdates, 1000);
                    statusInterval = setInterval(fetchStatus, 5000);
                });

                onUnmounted(() => {
                    if (pollInterval) clearInterval(pollInterval);
                    if (statusInterval) clearInterval(statusInterval);
                    if (wsPollInterval) clearInterval(wsPollInterval);
                });

                // Session state (for MCP coordination mode)
                const sessions = ref([]);
                const activeSessionId = ref(null);
                const mcpMode = ref(false);

                // Sync selected element to backend (for MCP to query)
                watch(selectedElement, async (newElement) => {
                    try {
                        await fetch('/api/sessions/active/selected', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ element: newElement })
                        });
                    } catch (err) {
                        // Silently ignore - selection sync is optional
                    }
                });

                // Fetch sessions (for MCP mode)
                async function fetchSessions() {
                    try {
                        const res = await fetch('/api/sessions');
                        const data = await res.json();
                        sessions.value = data.sessions || [];
                        activeSessionId.value = data.activeSessionId;
                        mcpMode.value = data.mcpMode || false;
                    } catch (err) {
                        // Ignore
                    }
                }

                // Switch active session
                async function switchSession(sessionId) {
                    try {
                        await fetch(`/api/sessions/${sessionId}/activate`, { method: 'POST' });
                        activeSessionId.value = sessionId;
                        // Refresh layout inspector data
                        if (view.value === 'layout') {
                            await loadComposeTree();
                            await loadScreenshot();
                        }
                    } catch (err) {
                        showToast('Failed to switch session');
                    }
                }

                // Check for sessions periodically in MCP mode
                setInterval(fetchSessions, 5000);
                fetchSessions();

                return {
                    view,
                    packageName,
                    eventCount,
                    streamingConnected,
                    requests,
                    sortedRequests,
                    selectedRequest,
                    isLive,
                    sortField,
                    sortAsc,
                    activeTab,
                    toastMessage,
                    toastVisible,
                    formatTime,
                    getMethod,
                    getUrl,
                    getStatusCode,
                    getDuration,
                    getStatusClass,
                    getHeaders,
                    getBody,
                    toggleSort,
                    showDetail,
                    clearRequests,
                    copyBody,
                    downloadBody,
                    exportTransaction,
                    exportAllTransactions,
                    // Layout Inspector
                    screenshotUrl,
                    screenshotLoaded,
                    screenshotNaturalWidth,
                    screenshotNaturalHeight,
                    composeTree,
                    selectedElement,
                    selectedAncestors,
                    hoveredElement,
                    hoverTooltipPos,
                    multiSelectedElements,
                    multiSelectedIds,
                    inspectorError,
                    overlayStyle,
                    overlayViewBoxWidth,
                    overlayViewBoxHeight,
                    windowOffsetX,
                    windowOffsetY,
                    screenshotContainer,
                    screenshotImg,
                    openLayoutInspector,
                    refreshScreenshot,
                    onScreenshotLoad,
                    onScreenshotClick,
                    onScreenshotHover,
                    onScreenshotLeave,
                    onTreeSelect,
                    onTreeHover,
                    isSelected,
                    clearMultiSelect,
                    exportSelectedElements,
                    truncate,
                    // WebSocket Inspector
                    wsConnections,
                    selectedWsConnection,
                    wsMessages,
                    wsIsLive,
                    openWebSocketInspector,
                    refreshWebSocketConnections,
                    showWsDetail,
                    formatDateTime,
                    formatSize,
                    truncatePayload,
                    // Session management (MCP mode)
                    sessions,
                    activeSessionId,
                    mcpMode,
                    switchSession
                };
            }
        });

        // Register TreeNode component
        app.component('tree-node', TreeNode);
        app.mount('#app');
    </script>
</body>
</html>
