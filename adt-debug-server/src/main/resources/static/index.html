<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ADT Debug Server</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            line-height: 1.5;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        h3 { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 24px; }
        .card { background: #222; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .card p { color: #888; margin-bottom: 12px; }
        code { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .btn {
            display: inline-block; padding: 8px 16px; background: #4caf50; color: #fff;
            text-decoration: none; border-radius: 4px; border: none; cursor: pointer; font-size: 14px;
        }
        .btn:hover { background: #45a049; }
        .btn-secondary { background: #444; }
        .btn-secondary:hover { background: #555; }
        .status-grid { display: flex; gap: 24px; }
        .status-label { color: #666; font-size: 12px; display: block; }
        .status-value { font-size: 20px; font-weight: bold; }
        .status-value.connected { color: #4caf50; }
        .status-value.disconnected { color: #f44336; }

        /* Navigation */
        .nav { display: flex; gap: 8px; margin-bottom: 16px; }
        .nav-link { color: #4caf50; text-decoration: none; padding: 4px 8px; border-radius: 4px; }
        .nav-link:hover { background: #333; }
        .nav-link.active { background: #333; }

        /* Network list */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .toolbar-left { display: flex; align-items: center; gap: 16px; }
        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }
        .live-dot.paused { background: #666; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .header-row { display: flex; padding: 8px 12px; border-bottom: 1px solid #444; color: #666; font-size: 11px; text-transform: uppercase; }
        .header-row span { cursor: pointer; user-select: none; }
        .header-row span:hover { color: #888; }

        .request-row {
            display: flex; padding: 12px; border-bottom: 1px solid #333;
            cursor: pointer; text-decoration: none; color: inherit; align-items: center;
            transition: background 0.2s;
        }
        .request-row:hover { background: #2a2a2a; }
        .request-row.new { animation: highlight 2s ease-out; }
        @keyframes highlight { from { background: #3a3a1a; } to { background: transparent; } }

        .col-time { width: 90px; color: #666; font-size: 12px; font-family: monospace; }
        .col-method { width: 55px; font-weight: bold; font-size: 12px; }
        .col-method.GET { color: #4caf50; }
        .col-method.POST { color: #ff9800; }
        .col-method.PUT { color: #2196f3; }
        .col-method.DELETE { color: #f44336; }
        .col-method.PATCH { color: #9c27b0; }
        .col-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ccc; }
        .col-status { width: 50px; text-align: center; }
        .col-status.s2xx { color: #4caf50; }
        .col-status.s3xx { color: #ff9800; }
        .col-status.s4xx, .col-status.s5xx { color: #f44336; }
        .col-duration { width: 70px; text-align: right; color: #888; font-size: 12px; }

        .empty { text-align: center; padding: 40px; color: #666; }
        .count-text { color: #666; font-size: 12px; margin-top: 16px; }

        /* Detail view */
        .meta { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
        .meta-item .meta-label { color: #666; font-size: 11px; }
        .meta-item .meta-value { font-size: 16px; }
        .tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 16px; }
        .tab {
            padding: 8px 16px; cursor: pointer; color: #888;
            border: none; background: none; font-size: 14px;
        }
        .tab:hover { color: #aaa; }
        .tab.active { color: #fff; border-bottom: 2px solid #4caf50; }
        .section { margin-bottom: 24px; }
        .header-item { display: flex; padding: 4px 0; border-bottom: 1px solid #333; font-size: 13px; }
        .header-name { width: 200px; color: #888; }
        .header-value { flex: 1; word-break: break-all; }
        .body-content {
            background: #1a1a1a; padding: 12px; border-radius: 4px;
            font-family: monospace; font-size: 12px; white-space: pre-wrap;
            word-break: break-all; max-height: 400px; overflow: auto;
        }

        /* Body actions */
        .body-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .body-actions { display: flex; gap: 8px; }
        .btn-small {
            padding: 4px 8px; font-size: 12px; background: #333; color: #ccc;
            border: none; border-radius: 4px; cursor: pointer;
        }
        .btn-small:hover { background: #444; }
        .btn-small.success { background: #2e7d32; color: #fff; }

        /* Toast notification */
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            background: #333; color: #fff; border-radius: 4px; font-size: 14px;
            opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }

        /* Layout Inspector */
        .inspector-layout {
            display: flex;
            gap: 16px;
            height: calc(100vh - 140px);
        }
        .inspector-left {
            flex: 0 0 50%;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .inspector-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .screenshot-container {
            position: relative;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .screenshot-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .screenshot-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .element-box {
            position: absolute;
            border: 2px solid #4caf50;
            background: rgba(76, 175, 80, 0.1);
            pointer-events: none;
            transition: all 0.15s;
        }
        .element-box.hover {
            border-color: #2196f3;
            background: rgba(33, 150, 243, 0.1);
        }
        .element-box.multi {
            border-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }
        .hover-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }
        .tree-panel {
            flex: 1;
            overflow: auto;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 8px;
        }
        .tree-node {
            padding: 4px 8px;
            margin: 2px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tree-node:hover { background: #2a2a2a; }
        .tree-node.selected { background: #1e3a1e; border: 1px solid #4caf50; }
        .tree-node.hovered { background: #1e2a3a; }
        .tree-node.multi-selected { background: #3a2a1e; border: 1px solid #ff9800; }
        .tree-toggle {
            width: 16px;
            text-align: center;
            color: #666;
            cursor: pointer;
        }
        .tree-name { color: #ce9178; }
        .tree-text { color: #6a9955; font-size: 11px; margin-left: 4px; }
        .tree-children { margin-left: 16px; }

        .element-detail {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow: auto;
        }
        .detail-row {
            display: flex;
            padding: 4px 0;
            font-size: 13px;
        }
        .detail-label { width: 120px; color: #888; }
        .detail-value { flex: 1; word-break: break-all; }
        .detail-value.code { font-family: monospace; color: #ce9178; }
        .detail-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ancestors {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .ancestor-chip {
            background: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: #888;
        }
        .ancestor-chip:last-child { color: #4caf50; background: #1e3a1e; }
        .multi-select-bar {
            background: #2a2a1e;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        /* WebSocket styles */
        .ws-status { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: bold; }
        .ws-status.CONNECTING { background: #ff9800; color: #000; }
        .ws-status.OPEN { background: #4caf50; color: #fff; }
        .ws-status.CLOSING { background: #ff5722; color: #fff; }
        .ws-status.CLOSED { background: #666; color: #fff; }

        .ws-source { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #333; color: #aaa; }

        .ws-connection-row {
            display: flex; padding: 12px; border-bottom: 1px solid #333;
            cursor: pointer; text-decoration: none; color: inherit; align-items: center;
            gap: 12px; transition: background 0.2s;
        }
        .ws-connection-row:hover { background: #2a2a2a; }
        .ws-connection-row.new { animation: highlight 2s ease-out; }

        .col-ws-status { width: 90px; }
        .col-ws-source { width: 100px; }
        .col-ws-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ccc; }
        .col-ws-time { width: 90px; color: #666; font-size: 12px; font-family: monospace; text-align: right; }

        .ws-message {
            display: flex;
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            gap: 12px;
            font-size: 13px;
        }
        .ws-message.sent { background: #1e2a1e; }
        .ws-message.received { background: #1e1e2a; }

        .ws-direction {
            width: 24px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ws-direction.sent { color: #4caf50; }
        .ws-direction.received { color: #2196f3; }

        .ws-msg-time { width: 90px; color: #666; font-size: 12px; font-family: monospace; }
        .ws-msg-type { width: 50px; font-size: 11px; color: #888; }
        .ws-msg-payload { flex: 1; word-break: break-all; white-space: pre-wrap; font-family: monospace; }
        .ws-msg-size { width: 60px; text-align: right; color: #666; font-size: 12px; }

        .ws-detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .ws-detail-url {
            word-break: break-all;
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- Session indicator (MCP mode) -->
            <div v-if="mcpMode && sessions.length > 0" style="margin-bottom: 16px; padding: 8px 12px; background: #2a2a2a; border-radius: 4px; display: flex; align-items: center; gap: 12px;">
                <span style="color: #888; font-size: 12px;">Session:</span>
                <select v-if="sessions.length > 1" @change="switchSession($event.target.value)" :value="activeSessionId"
                        style="background: #333; border: 1px solid #444; color: #fff; padding: 4px 8px; border-radius: 4px;">
                    <option v-for="s in sessions" :key="s.id" :value="s.id">{{ s.packageName }} ({{ s.device }})</option>
                </select>
                <span v-else style="color: #4caf50;">{{ sessions[0]?.packageName }}</span>
                <span style="color: #666; font-size: 11px; margin-left: auto;">MCP Mode</span>
            </div>

            <!-- Home View -->
            <template v-if="view === 'home'">
                <h1>ADT Debug Server</h1>
                <p class="subtitle" v-if="!mcpMode">Package: {{ packageName }}</p>
                <p class="subtitle" v-else-if="sessions.length > 0">Package: {{ sessions.find(s => s.id === activeSessionId)?.packageName || 'None' }}</p>
                <p class="subtitle" v-else>No sessions connected. Waiting for MCP...</p>

                <div class="card">
                    <h2>Status</h2>
                    <div class="status-grid">
                        <div>
                            <span class="status-label">Events</span>
                            <span class="status-value">{{ eventCount }}</span>
                        </div>
                        <div>
                            <span class="status-label">Streaming</span>
                            <span class="status-value" :class="streamingConnected ? 'connected' : 'disconnected'">
                                {{ streamingConnected ? 'Connected' : 'Disconnected' }}
                            </span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Network</h2>
                    <p>Monitor HTTP requests and responses</p>
                    <button class="btn" @click="view = 'network'">View HTTP Traffic</button>
                </div>

                <div class="card">
                    <h2>WebSocket</h2>
                    <p>Monitor WebSocket connections and messages</p>
                    <button class="btn" @click="openWebSocketInspector">View WebSocket Traffic</button>
                </div>

                <div class="card">
                    <h2>Layout Inspector</h2>
                    <p>Visually inspect Compose UI hierarchy</p>
                    <button class="btn" @click="openLayoutInspector">Open Layout Inspector</button>
                </div>

                <div class="card">
                    <h2>API Endpoints</h2>
                    <ul style="margin-left: 20px; color: #888;">
                        <li><code>/network</code> - List network events</li>
                        <li><code>/network/{id}</code> - Event details</li>
                        <li><code>/network/stats</code> - Statistics</li>
                        <li><code>/health</code> - Health check</li>
                    </ul>
                </div>
            </template>

            <!-- Network List View -->
            <template v-else-if="view === 'network'">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <h1>Network Traffic</h1>
                        <div class="live-indicator">
                            <span class="live-dot" :class="{ paused: !isLive }"></span>
                            <span>{{ isLive ? 'Live' : 'Paused' }}</span>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-secondary" @click="view = 'home'">Home</button>
                        <button class="btn btn-secondary" @click="isLive = !isLive">
                            {{ isLive ? 'Pause' : 'Resume' }}
                        </button>
                        <button class="btn btn-secondary" @click="clearRequests">Clear</button>
                        <button class="btn btn-secondary" @click="exportAllTransactions">Export All</button>
                    </div>
                </div>

                <div class="card" style="padding: 0;">
                    <div class="header-row">
                        <span class="col-time" @click="toggleSort('timestamp')">
                            Time {{ sortField === 'timestamp' ? (sortAsc ? '\u25B2' : '\u25BC') : '' }}
                        </span>
                        <span class="col-method">Method</span>
                        <span class="col-url" @click="toggleSort('url')">
                            URL {{ sortField === 'url' ? (sortAsc ? '\u25B2' : '\u25BC') : '' }}
                        </span>
                        <span class="col-status" @click="toggleSort('responseCode')">
                            Status {{ sortField === 'responseCode' ? (sortAsc ? '\u25B2' : '\u25BC') : '' }}
                        </span>
                        <span class="col-duration" @click="toggleSort('duration')">
                            Duration {{ sortField === 'duration' ? (sortAsc ? '\u25B2' : '\u25BC') : '' }}
                        </span>
                    </div>

                    <div v-if="sortedRequests.length === 0" class="empty">
                        No network requests captured yet
                    </div>
                    <div v-else>
                        <div v-for="req in sortedRequests" :key="req.id"
                             class="request-row" :class="{ new: req.isNew }"
                             @click="showDetail(req.id)">
                            <span class="col-time">{{ formatTime(req.startTime || req.timestamp) }}</span>
                            <span class="col-method" :class="getMethod(req)">{{ getMethod(req) }}</span>
                            <span class="col-url">{{ getUrl(req) }}</span>
                            <span class="col-status" :class="getStatusClass(req)">
                                {{ getStatusCode(req) || '-' }}
                            </span>
                            <span class="col-duration">{{ getDuration(req) }}ms</span>
                        </div>
                    </div>
                </div>

                <p class="count-text">{{ requests.length }} requests</p>
            </template>

            <!-- Detail View -->
            <template v-else-if="view === 'detail' && selectedRequest">
                <div style="margin-bottom: 16px;">
                    <a href="#" @click.prevent="view = 'network'" style="color: #4caf50;">&larr; Back to list</a>
                </div>

                <div class="card">
                    <h2 style="margin-bottom: 8px;">
                        <span :style="{ color: getMethod(selectedRequest) === 'GET' ? '#4caf50' : '#ff9800' }">
                            {{ getMethod(selectedRequest) }}
                        </span>
                        <span :style="{ color: getStatusCode(selectedRequest) >= 200 && getStatusCode(selectedRequest) < 300 ? '#4caf50' : '#f44336' }">
                            {{ getStatusCode(selectedRequest) || '-' }}
                        </span>
                    </h2>
                    <p style="word-break: break-all; color: #ccc;">{{ getUrl(selectedRequest) }}</p>

                    <div class="meta">
                        <div class="meta-item">
                            <div class="meta-label">Duration</div>
                            <div class="meta-value">{{ getDuration(selectedRequest) }}ms</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Status</div>
                            <div class="meta-value">{{ selectedRequest.status || selectedRequest.data?.status || 'UNKNOWN' }}</div>
                        </div>
                        <div class="meta-item" style="margin-left: auto;">
                            <button class="btn btn-secondary" @click="exportTransaction(selectedRequest)">Export JSON</button>
                        </div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab" :class="{ active: activeTab === 'request' }" @click="activeTab = 'request'">
                        Request
                    </button>
                    <button class="tab" :class="{ active: activeTab === 'response' }" @click="activeTab = 'response'">
                        Response
                    </button>
                </div>

                <!-- Request Tab -->
                <div v-show="activeTab === 'request'">
                    <div class="section">
                        <h3>Headers</h3>
                        <template v-if="getHeaders(selectedRequest, 'request').length > 0">
                            <div v-for="(header, idx) in getHeaders(selectedRequest, 'request')" :key="idx" class="header-item">
                                <span class="header-name">{{ header.name }}</span>
                                <span class="header-value">{{ header.value }}</span>
                            </div>
                        </template>
                        <p v-else style="color: #666;">No headers captured</p>
                    </div>
                    <div v-if="getBody(selectedRequest, 'request')" class="section">
                        <div class="body-header">
                            <h3>Body</h3>
                            <div class="body-actions">
                                <button class="btn-small" @click="copyBody('request')">Copy</button>
                                <button class="btn-small" @click="downloadBody('request')">Download</button>
                            </div>
                        </div>
                        <div class="body-content">{{ getBody(selectedRequest, 'request') }}</div>
                    </div>
                </div>

                <!-- Response Tab -->
                <div v-show="activeTab === 'response'">
                    <div class="section">
                        <h3>Headers</h3>
                        <template v-if="getHeaders(selectedRequest, 'response').length > 0">
                            <div v-for="(header, idx) in getHeaders(selectedRequest, 'response')" :key="idx" class="header-item">
                                <span class="header-name">{{ header.name }}</span>
                                <span class="header-value">{{ header.value }}</span>
                            </div>
                        </template>
                        <p v-else style="color: #666;">No headers captured</p>
                    </div>
                    <div v-if="getBody(selectedRequest, 'response')" class="section">
                        <div class="body-header">
                            <h3>Body</h3>
                            <div class="body-actions">
                                <button class="btn-small" @click="copyBody('response')">Copy</button>
                                <button class="btn-small" @click="downloadBody('response')">Download</button>
                            </div>
                        </div>
                        <div class="body-content">{{ getBody(selectedRequest, 'response') }}</div>
                    </div>
                </div>
            </template>

            <!-- Layout Inspector View -->
            <template v-else-if="view === 'inspector'">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <h1>Layout Inspector</h1>
                    </div>
                    <div>
                        <button class="btn btn-secondary" @click="view = 'home'">Home</button>
                        <button class="btn btn-secondary" @click="refreshScreenshot">Refresh</button>
                        <button class="btn btn-secondary" v-if="multiSelectedElements.length > 0"
                                @click="clearMultiSelect">Clear Selection ({{ multiSelectedElements.length }})</button>
                        <button class="btn btn-secondary" v-if="selectedElement || multiSelectedElements.length > 0"
                                @click="exportSelectedElements">Export</button>
                    </div>
                </div>

                <div v-if="inspectorError" class="card" style="color: #f44336;">
                    {{ inspectorError }}
                </div>

                <div v-else class="inspector-layout">
                    <!-- Left: Screenshot -->
                    <div class="inspector-left">
                        <div class="screenshot-container"
                             @click="onScreenshotClick"
                             @mousemove="onScreenshotHover"
                             @mouseleave="onScreenshotLeave"
                             ref="screenshotContainer">
                            <img v-if="screenshotUrl" :src="screenshotUrl" ref="screenshotImg"
                                 @load="onScreenshotLoad" draggable="false">
                            <div v-else style="color: #666;">Loading screenshot...</div>

                            <!-- Overlay for bounding boxes -->
                            <!-- viewBox uses screen dimensions since bounds from localToScreen are in screen coordinates -->
                            <svg v-if="screenshotLoaded" class="screenshot-overlay"
                                 :view-box.camel="'0 0 ' + overlayViewBoxWidth + ' ' + overlayViewBoxHeight"
                                 :style="overlayStyle">
                                <!-- Hover box - subtract window offset to convert screen coords to window coords -->
                                <rect v-if="hoveredElement && !isSelected(hoveredElement)"
                                      :x="hoveredElement.bounds.left - windowOffsetX"
                                      :y="hoveredElement.bounds.top - windowOffsetY"
                                      :width="hoveredElement.bounds.right - hoveredElement.bounds.left"
                                      :height="hoveredElement.bounds.bottom - hoveredElement.bounds.top"
                                      fill="rgba(33, 150, 243, 0.15)"
                                      stroke="#2196f3"
                                      stroke-width="2"/>
                                <!-- Selected box -->
                                <rect v-if="selectedElement"
                                      :x="selectedElement.bounds.left - windowOffsetX"
                                      :y="selectedElement.bounds.top - windowOffsetY"
                                      :width="selectedElement.bounds.right - selectedElement.bounds.left"
                                      :height="selectedElement.bounds.bottom - selectedElement.bounds.top"

                                      stroke="#4caf50"

                                <!-- Multi-selected boxes -->
                                <rect v-for="el in multiSelectedElements" :key="el.id"
                                      :x="el.bounds.left - windowOffsetX"
                                      :y="el.bounds.top - windowOffsetY"
                                      :width="el.bounds.right - el.bounds.left"
                                      :height="el.bounds.bottom - el.bounds.top"
                                      fill="rgba(255, 152, 0, 0.15)"
                                      stroke="#ff9800"
                                      stroke-width="2"/>
                            </svg>

                            <!-- Hover tooltip -->
                            <div v-if="hoveredElement && hoverTooltipPos" class="hover-tooltip"
                                 :style="{ left: hoverTooltipPos.x + 'px', top: hoverTooltipPos.y + 'px' }">
                                {{ hoveredElement.composable }}
                                <span v-if="hoveredElement.text" style="color: #6a9955;"> "{{ truncate(hoveredElement.text, 20) }}"</span>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Tree + Details -->
                    <div class="inspector-right">
                        <!-- Multi-select bar -->
                        <div v-if="multiSelectedElements.length > 0" class="multi-select-bar">
                            <span>{{ multiSelectedElements.length }} elements selected (Shift+click to add more)</span>
                            <button class="btn-small" @click="clearMultiSelect">Clear</button>
                        </div>

                        <!-- Tree View -->
                        <div class="tree-panel" style="margin-bottom: 16px;">
                            <div v-if="composeTree">
                                <tree-node :node="composeTree.root"
                                           :selected-id="selectedElement?.id"
