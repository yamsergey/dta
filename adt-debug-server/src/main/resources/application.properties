# ADT Debug Server Configuration

# Server port (default, can be overridden via --port)
server.port=${PORT:8080}

# Debug configuration (overridden at runtime)
debug.access-token=
debug.device-serial=
debug.package-name=

# Logging
logging.level.root=WARN
logging.level.io.yamsergey.adt.debug=INFO

# Disable banner
spring.main.banner-mode=off

# Jackson configuration
spring.jackson.serialization.indent-output=true
